name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["1.12"]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.julia/packages
            ~/.julia/compiled
          key: ${{ runner.os }}-julia-${{ matrix.julia-version }}-${{ hashFiles('Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ matrix.julia-version }}-

      - name: Add Julia registries
        run: |
          julia --startup-file=no --project -e '
            import Pkg
            regs = Dict(r.name => r for r in Pkg.Registry.reachable_registries())
            haskey(regs, "General") || Pkg.Registry.add(Pkg.RegistrySpec(url="https://github.com/JuliaRegistries/General.git"))
            haskey(regs, "OpenModelica") || Pkg.Registry.add(Pkg.RegistrySpec(url="https://github.com/OpenModelica/OpenModelicaRegistry.git"))
          '

      - name: Instantiate
        run: julia --startup-file=no --project -e 'import Pkg; Pkg.instantiate()'

      - name: Build native dependencies (OMParser shared library)
        run: julia --startup-file=no --project -e 'import Pkg; Pkg.build("OMParser")'

      - name: Install OpenModelica (omc)
        run: |
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg lsb-release
          curl -fsSL https://build.openmodelica.org/apt/openmodelica.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/openmodelica.gpg
          echo "deb https://build.openmodelica.org/apt \
            $(lsb_release -cs) stable" \
            | sudo tee /etc/apt/sources.list.d/openmodelica.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends omc
          omc --version

      - name: Run tests
        run: julia --startup-file=no --project -e 'import Pkg; Pkg.test()'
